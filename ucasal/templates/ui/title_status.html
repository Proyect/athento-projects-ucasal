{% extends "ui/base.html" %}
{% block content %}
<div class="card shadow-sm mb-3">
  <div class="card-header"><strong>Estado / Log de título</strong></div>
  <div class="card-body">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <p><strong>UUID:</strong> {{ uuid }}</p>
    {% if data %}
      <pre class="bg-light p-3 border rounded small">{{ data|safe }}</pre>
    {% else %}
      <p class="text-muted">No hay datos para mostrar.</p>
    {% endif %}
    <a href="/ui/titulos/" class="btn btn-secondary mt-2">Volver al listado</a>
  </div>
</div>
{% endblock %}
