{% extends "ui/base.html" %}
{% block content %}
<div class="card shadow-sm mb-3">
  <div class="card-header"><strong>Reemplazar archivo de título</strong></div>
  <div class="card-body">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% elif ok %}
      <div class="alert alert-success">Archivo reemplazado correctamente.</div>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">UUID</label>
        <input type="text" readonly class="form-control-plaintext" value="{{ uuid }}" />
      </div>
      <div class="mb-3">
        <label class="form-label">Nuevo archivo</label>
        <input type="file" name="file" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Nombre de archivo (opcional)</label>
        <input type="text" name="filename" class="form-control" />
        <div class="form-text">Si se deja vacío, se usará el nombre del archivo subido.</div>
      </div>
      <button type="submit" class="btn btn-primary">Reemplazar</button>
      <a href="/ui/titulos/" class="btn btn-secondary">Volver al listado</a>
    </form>
  </div>
</div>
{% endblock %}
