{% extends "ui/base.html" %}
{% block content %}
<div class="card shadow-sm mb-3">
  <div class="card-header"><strong>Editar metadatos de título</strong></div>
  <div class="card-body">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% elif ok %}
      <div class="alert alert-success">Metadatos actualizados correctamente.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">UUID</label>
        <input type="text" readonly class="form-control-plaintext" value="{{ uuid }}" />
      </div>
      <div class="mb-3">
        <label class="form-label">Metadatos (JSON)</label>
        <textarea name="metadatas" class="form-control" rows="10">{{ metadatas }}</textarea>
        <div class="form-text">Pegue aquí un objeto JSON con los metadatos a actualizar.</div>
      </div>
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="/ui/titulos/" class="btn btn-secondary">Volver al listado</a>
    </form>
  </div>
</div>
{% endblock %}
