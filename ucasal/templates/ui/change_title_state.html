{% extends "ui/base.html" %}
{% block content %}
<div class="card shadow-sm mb-3">
  <div class="card-header"><strong>Cambiar estado del título</strong></div>
  <div class="card-body">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% elif ok %}
      <div class="alert alert-success">El estado del título fue actualizado a "{{ estado }}".</div>
    {% endif %}
    <p><strong>UUID:</strong> {{ uuid }}</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Nuevo estado</label>
        <input type="text" name="estado" class="form-control" placeholder="Ej.: aprobado, pendiente, rechazado" required />
      </div>
      <button type="submit" class="btn btn-primary">Actualizar estado</button>
      <a href="/ui/titulos/" class="btn btn-secondary">Volver al listado</a>
    </form>
  </div>
</div>
{% endblock %}
