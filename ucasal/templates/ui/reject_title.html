{% extends "ui/base.html" %}
{% block content %}
<div class="card shadow-sm mb-3">
  <div class="card-header"><strong>Rechazar título</strong></div>
  <div class="card-body">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% elif ok %}
      <div class="alert alert-success">El título fue marcado como rechazado.</div>
    {% endif %}
    <p><strong>UUID:</strong> {{ uuid }}</p>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Motivo de rechazo</label>
        <textarea name="reason" class="form-control" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn btn-danger">Rechazar título</button>
      <a href="/ui/titulos/" class="btn btn-secondary">Volver al listado</a>
    </form>
  </div>
</div>
{% endblock %}
